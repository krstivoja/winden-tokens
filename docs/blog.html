---
layout: default
title: Blog & Updates
---

<div class="max-w-4xl mx-auto px-6 py-16">
  <h1 class="text-4xl font-bold text-slate-900 mb-8">Updates & Changelog</h1>

  <div class="space-y-8">
    {% for post in site.posts %}
    <article class="border-b border-slate-200 pb-8">
      <div class="flex items-center gap-4 mb-3">
        <time class="text-sm text-slate-500">{{ post.date | date: "%B %d, %Y" }}</time>
        {% if post.version %}
        <span class="px-2 py-1 text-xs font-semibold bg-indigo-100 text-indigo-700 rounded">
          v{{ post.version }}
        </span>
        {% endif %}
      </div>

      <h2 class="text-2xl font-bold text-slate-900 mb-3">
        <a href="{{ post.url | relative_url }}" class="hover:text-indigo-600">
          {{ post.title }}
        </a>
      </h2>

      <div class="text-slate-600 prose">
        {{ post.excerpt }}
      </div>

      <a href="{{ post.url | relative_url }}" class="inline-flex items-center text-indigo-600 hover:text-indigo-700 font-medium mt-3">
        Read more →
      </a>
    </article>
    {% endfor %}
  </div>
</div>
