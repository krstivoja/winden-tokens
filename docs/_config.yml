title: Winden Tokens
description: Professional Design Token Management for Figma
baseurl: "/winden-tokens"
url: "https://krstivoja.github.io"

# Build settings
markdown: kramdown
theme: minima

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:categories/:title/

# Defaults
defaults:
  # All posts get post layout
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Winden Tokens Team"

  # Releases category defaults
  - scope:
      path: "_posts/releases"
      type: "posts"
    values:
      layout: "post"
      categories: releases

  # Features category defaults
  - scope:
      path: "_posts/features"
      type: "posts"
    values:
      layout: "post"
      categories: features

  # Tutorials category defaults
  - scope:
      path: "_posts/tutorials"
      type: "posts"
    values:
      layout: "post"
      categories: tutorials

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - README.md
