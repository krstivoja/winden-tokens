<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", system-ui, sans-serif;
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: "Bricolage Grotesque", "Inter", system-ui, sans-serif;
      }

      .prose { max-width: 65ch; }
      .prose p { margin: 1em 0; }
      .prose ul { margin: 1em 0; padding-left: 1.5em; }
      .prose li { margin: 0.5em 0; }
    </style>
  </head>
  <body class="bg-white antialiased">
    {% include header.html %}

    <main>
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
